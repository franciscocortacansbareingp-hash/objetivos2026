<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operativo 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv";

        function DashboardVentas() {
            const [rawData, setRawData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [mesSeleccionado, setMesSeleccionado] = React.useState(new Date().getMonth() + 1);
            const [diasHabiles, setDiasHabiles] = React.useState(22);
            const [darkMode, setDarkMode] = React.useState(false);
            const [activeTab, setActiveTab] = React.useState('general');

            const mesesNombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

            React.useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(csv => {
                        const rows = csv.split('\n').filter(r => r.trim() !== '').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                        const headers = rows[0].map(h => h.trim().replace(/"/g, ''));
                        const jsonData = rows.slice(1).map(row => {
                            let obj = {};
                            row.forEach((cell, i) => { obj[headers[i]] = cell?.trim().replace(/"/g, ''); });
                            return obj;
                        });
                        setRawData(jsonData);
                        setLoading(false);
                    });
            }, []);

            const calcularMetricas = (idVendedor) => {
                const filtrado = rawData.filter(r => {
                    const matchVendedor = Number(r.Vendedor) === idVendedor;
                    const valorMesCol = String(r.Mes || '').trim();
                    const nombreMesActual = mesesNombres[mesSeleccionado - 1].toUpperCase();
                    return matchVendedor && (valorMesCol === String(mesSeleccionado) || valorMesCol.toUpperCase() === nombreMesActual);
                });

                const parseNum = (val) => {
                    if (!val || val === "") return 0;
                    let clean = val.replace(/[$\s]/g, '').replace(/\./g, '').replace(',', '.');
                    return parseFloat(clean) || 0;
                };

                const sum = (arr, col) => arr.reduce((acc, r) => acc + parseNum(r[col]), 0);
                const incluye = (arr, col, txt) => arr.filter(r => String(r[col] || '').toUpperCase().includes(txt.toUpperCase()));

                // --- LÓGICA DE NEGOCIO ---
                const factTotal = sum(filtrado, 'Importe ML');
                
                // Neumáticos Cantidades
                const nMostrador = sum(filtrado.filter(r => r['Llanta 17'] && ['SUB','VAN','H','SPIDER','T','V','W'].includes(String(r.RANGO || '').toUpperCase())), 'Cant');
                const nOtras = sum(filtrado.filter(r => r['Llanta 17'] && String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Cant');
                const totalCantNeu = nMostrador + nOtras;

                // Facturación Neumáticos
                const factPirelli = sum(filtrado.filter(r => String(r.Marca || '').toUpperCase() === 'PIRELLI'), 'Importe ML');
                const factOtrasMarcas = sum(filtrado.filter(r => String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Importe ML');
                const factNeumaticosTotal = factPirelli + factOtrasMarcas;

                // Servicios y Accesorios (Uso de incluye para evitar fallos por espacios)
                const servRows = incluye(filtrado, 'RANGO', 'SERVICIO');
                const accRows = incluye(filtrado, 'RANGO', 'ACCESORIO');
                
                const servFact = sum(servRows, 'Importe ML');
                const accFact = sum(accRows, 'Importe ML');
                const accCant = sum(accRows, 'Cant');

                return {
                    general: {
                        "Facturación Total": factTotal,
                        "Facturación Diaria": diasHabiles > 0 ? factTotal / diasHabiles : 0,
                        "Alineaciones": sum(incluye(filtrado, 'Descripción', 'ALINEACION'), 'Cant'),
                        "Balanceos": sum(incluye(filtrado, 'Descripción', 'BALANCEO'), 'Cant'),
                        "Válvulas (Cant)": sum(incluye(filtrado, 'Descripción', 'VALVULA'), 'Cant'),
                        "Total Llantas": sum(incluye(filtrado, 'RANGO', 'REP '), 'Cant'),
                        "Ticket Medio Servicio": sum(servRows, 'Cant') > 0 ? servFact / sum(servRows, 'Cant') : 0,
                        "% Servicio/Fact": factTotal > 0 ? servFact / factTotal : 0,
                    },
                    neumaticos: {
                        "Facturación Neumáticos": factNeumaticosTotal,
                        "Facturación Pirelli": factPirelli,
                        "Facturación Otras": factOtrasMarcas,
                        "Facturación Accesorios": accFact,
                        "Total Neumáticos (Cant)": totalCantNeu,
                        "Neumáticos Ticket Medio": totalCantNeu > 0 ? factNeumaticosTotal / totalCantNeu : 0,
                        "Accesorios (Cant)": accCant,
                        "% Accesorios/Fact": factTotal > 0 ? accFact / factTotal : 0,
                        "Baterías": sum(incluye(filtrado, 'Descripción', 'BAT'), 'Cant'),
                        "Matafuegos": sum(incluye(filtrado, 'Descripción', 'Matafuego'), 'Cant'),
                    }
                };
            };

            if (loading) return <div className="h-screen flex justify-center items-center bg-slate-900 text-white font-black text-xl">Sincronizando...</div>;

            const res88 = calcularMetricas(88);
            const res99 = calcularMetricas(99);

            return (
                <div className={`min-h-screen p-6 transition-colors duration-300 ${darkMode ? 'bg-black text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    <div className="max-w-6xl mx-auto">
                        
                        {/* HEADER REFORZADO MODO NOCHE */}
                        <header className={`flex justify-between items-center mb-8 p-8 rounded-[2.5rem] border shadow-2xl ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-100'}`}>
                            <h1 className="text-2xl font-black tracking-tighter">OPERATIVO 2026</h1>
                            <div className="flex items-center gap-8">
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">Mes</p>
                                    <select className="bg-transparent font-bold text-lg text-blue-500 outline-none cursor-pointer" value={mesSeleccionado} onChange={e => setMesSeleccionado(Number(e.target.value))}>
                                        {mesesNombres.map((m, i) => <option key={m} value={i+1} className="text-black">{m}</option>)}
                                    </select>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-400 uppercase">Hábiles</p>
                                    <input type="number" className="bg-transparent font-bold text-lg w-12 text-blue-500 outline-none" value={diasHabiles} onChange={e => setDiasHabiles(Number(e.target.value))} />
                                </div>
                                <button onClick={() => setDarkMode(!darkMode)} className={`p-4 rounded-2xl transition-transform active:scale-90 ${darkMode ? 'bg-slate-800 text-yellow-400' : 'bg-slate-100 text-slate-600'}`}>
                                    {darkMode ? '☀️' : '🌙'}
                                </button>
                            </div>
                        </header>

                        {/* TABS REFORZADOS */}
                        <div className={`flex gap-3 mb-10 p-2 rounded-2xl w-fit mx-auto ${darkMode ? 'bg-slate-900' : 'bg-slate-200'}`}>
                            {['general', 'neumaticos'].map(tab => (
                                <button 
                                    key={tab}
                                    onClick={() => setActiveTab(tab)} 
                                    className={`px-10 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition-all ${activeTab === tab ? 'bg-blue-600 text-white shadow-lg' : 'opacity-40 hover:opacity-100'}`}
                                >
                                    {tab === 'general' ? 'Gestión General' : 'Neumáticos'}
                                </button>
                            ))}
                        </div>

                        {/* TARJETAS */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <SucursalCard titulo="BECCAR (88)" datos={res88[activeTab]} color="blue" isDark={darkMode} />
                            <SucursalCard titulo="SAN MARTÍN (99)" datos={res99[activeTab]} color="emerald" isDark={darkMode} />
                        </div>
                    </div>
                </div>
            );
        }

        const SucursalCard = ({ titulo, datos, color, isDark }) => {
            const accent = color === 'blue' ? 'text-blue-500' : 'text-emerald-500';
            const border = color === 'blue' ? 'border-blue-500' : 'border-emerald-500';
            
            return (
                <div className={`rounded-[3rem] p-10 border-t-[12px] shadow-2xl transition-all ${isDark ? 'bg-slate-900 border-slate-800' : 'bg-white ' + border}`}>
                    <h2 className={`text-3xl font-black mb-10 tracking-tight ${accent}`}>{titulo}</h2>
                    <div className="grid grid-cols-2 gap-x-12 gap-y-8">
                        {Object.entries(datos).map(([label, val]) => (
                            <div key={label} className="border-b border-slate-100 dark:border-slate-800 pb-3">
                                <span className="text-[10px] font-bold text-slate-400 uppercase block mb-1 tracking-widest">{label}</span>
                                <span className={`text-2xl font-black ${isDark ? 'text-white' : 'text-slate-900'}`}>
                                    {label.includes('Fact') || label.includes('Ticket') || label.includes('Diaria') 
                                        ? `$${Math.round(val).toLocaleString('es-AR')}` 
                                        : label.includes('%') ? `${(val * 100).toFixed(1)}%` : Math.round(val)}
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardVentas />);
    </script>
</body>
</html>
