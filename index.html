<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operativo 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap');

        :root {
            --bg: #f4f3ef;
            --surface: #ffffff;
            --surface2: #f0efe9;
            --border: rgba(0,0,0,0.08);
            --border2: rgba(0,0,0,0.14);
            --text: #1a1916;
            --text2: #6b6a64;
            --text3: #9b9a94;
            --accent: #2563eb;
            --accent-light: #eff6ff;
            --teal: #0d7f5f;
            --teal-light: #e8f7f2;
            --amber: #b45309;
            --amber-light: #fef3c7;
            --radius: 10px;
            --radius-lg: 14px;
        }

        body.dark {
            --bg: #111110;
            --surface: #1c1c1a;
            --surface2: #242422;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.13);
            --text: #e8e6e0;
            --text2: #a09e98;
            --text3: #6a6864;
            --accent: #5b8ff9;
            --accent-light: #1a2540;
            --teal: #34c991;
            --teal-light: #0d2a1e;
            --amber: #f0a832;
            --amber-light: #2a1e06;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            min-height: 100vh;
            margin: 0;
        }

        /* HEADER */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 16px;
        }

        .header-title {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-sub {
            font-size: 12px;
            color: var(--text3);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text3);
        }

        .control-input,
        .control-select {
            padding: 6px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'DM Sans', system-ui;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .control-input:focus,
        .control-select:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--accent-light);
        }

        .theme-toggle {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            transition: all 0.15s;
            margin-top: 20px;
        }

        .theme-toggle:hover {
            border-color: var(--border2);
            background: var(--surface);
        }

        /* NAV TABS */
        .nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            gap: 0;
        }

        .nav-tab {
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text2);
            cursor: pointer;
            border: none;
            background: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.15s;
            font-family: 'DM Sans', system-ui;
        }

        .nav-tab:hover {
            color: var(--text);
        }

        .nav-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* MAIN LAYOUT */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* CARD GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 2rem;
        }

        /* CARD */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .card-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
        }

        .card-subtitle {
            font-size: 11px;
            color: var(--text3);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-body {
            padding: 18px;
        }

        /* METRIC ROW */
        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-size: 12px;
            color: var(--text2);
            font-weight: 500;
        }

        .metric-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            text-align: right;
        }

        .metric-value.accent {
            color: var(--accent);
        }

        .metric-value.teal {
            color: var(--teal);
        }

        .metric-value.amber {
            color: var(--amber);
        }

        /* COLOR BADGES */
        .badge-accent {
            background: var(--accent-light);
            color: var(--accent);
        }

        .badge-teal {
            background: var(--teal-light);
            color: var(--teal);
        }

        .badge-amber {
            background: var(--amber-light);
            color: var(--amber);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-right: 4px;
        }

        /* INDICATOR DOT */
        .indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .indicator.accent {
            background: var(--accent);
        }

        .indicator.teal {
            background: var(--teal);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                height: auto;
                padding: 12px 2rem;
                gap: 12px;
            }

            .header-controls {
                width: 100%;
                flex-wrap: wrap;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }
        }

        body.dark .control-input,
        body.dark .control-select,
        body.dark .theme-toggle {
            background: var(--surface2);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv";

        function DashboardVentas() {
            const [rawData, setRawData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [mesSeleccionado, setMesSeleccionado] = React.useState(3);
            const [diasHabiles, setDiasHabiles] = React.useState(22);
            const [activeTab, setActiveTab] = React.useState('general');
            const [isDark, setIsDark] = React.useState(false);

            const mesesNombres = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

            React.useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(csv => {
                        const rows = csv.split('\n').filter(r => r.trim() !== '').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                        const headers = rows[0].map(h => h.trim().replace(/"/g, ''));
                        const jsonData = rows.slice(1).map(row => {
                            let obj = {};
                            row.forEach((cell, i) => { obj[headers[i]] = cell?.trim().replace(/"/g, ''); });
                            return obj;
                        });
                        setRawData(jsonData);
                        setLoading(false);
                    });
            }, []);

            const calcularMetricas = (idVendedor) => {
                const filtrado = rawData.filter(r => {
                    const matchVendedor = Number(r.Vendedor) === idVendedor;
                    const valorMesCol = String(r.Mes || '').trim();
                    const nombreMesActual = mesesNombres[mesSeleccionado - 1].toUpperCase();
                    return matchVendedor && (valorMesCol === String(mesSeleccionado) || valorMesCol.toUpperCase() === nombreMesActual);
                });

                const parseNum = (val) => {
                    if (!val || val === "") return 0;
                    let clean = val.replace(/[$\s]/g, '').replace(/\./g, '').replace(',', '.');
                    return parseFloat(clean) || 0;
                };

                const sum = (arr, col) => arr.reduce((acc, r) => acc + parseNum(r[col]), 0);
                const incluye = (arr, col, txt) => arr.filter(r => String(r[col] || '').toUpperCase().includes(txt.toUpperCase()));

                const factTotal = sum(filtrado, 'Importe ML');
                const accRows = incluye(filtrado, 'RANGO', 'ACCESORIO');
                const accFact = sum(accRows, 'Importe ML');

                const nMostrador = sum(filtrado.filter(r => r['Llanta 17'] && ['SUB', 'VAN', 'H', 'SPIDER', 'T', 'V', 'W'].includes(String(r.RANGO || '').toUpperCase())), 'Cant');
                const nOtras = sum(filtrado.filter(r => r['Llanta 17'] && String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Cant');
                const totalCantNeu = nMostrador + nOtras;

                return {
                    general: {
                        "Facturación Total": factTotal,
                        "Facturación Diaria": diasHabiles > 0 ? factTotal / diasHabiles : 0,
                        "Alineaciones": sum(incluye(filtrado, 'Descripción', 'ALINEACION'), 'Cant'),
                        "Balanceos": sum(incluye(filtrado, 'Descripción', 'BALANCEO'), 'Cant'),
                        "Válvulas (Cant)": sum(incluye(filtrado, 'Descripción', 'VALVULA'), 'Cant'),
                        "% Valvulas/Neu": totalCantNeu > 0 ? sum(incluye(filtrado, 'Descripción', 'VALVULA'), 'Cant') / totalCantNeu : 0,
                    },
                    neumaticos: {
                        "Facturación Neumáticos": sum(filtrado.filter(r => String(r.Marca || '').toUpperCase() === 'PIRELLI' || String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Importe ML'),
                        "Total Neumáticos (Cant)": totalCantNeu,
                        "Accesorios (Cant)": sum(accRows, 'Cant'),
                        "% Accesorios/Fact": factTotal > 0 ? accFact / factTotal : 0,
                        "Baterías": sum(incluye(filtrado, 'Descripción', 'BAT'), 'Cant'),
                        "Matafuegos": sum(incluye(filtrado, 'Descripción', 'MATAFUEGO'), 'Cant'),
                    }
                };
            };

            React.useEffect(() => {
                document.body.classList.toggle('dark', isDark);
            }, [isDark]);

            if (loading) {
                return (
                    <div style={{display: 'flex', justifyContent: 'center', alignItems: 'center', height: '100vh', background: 'var(--bg)'}}>
                        <div style={{textAlign: 'center'}}>
                            <p style={{color: 'var(--text3)', fontSize: '14px', fontWeight: '500'}}>Cargando datos...</p>
                        </div>
                    </div>
                );
            }

            const beccar = calcularMetricas(88)[activeTab];
            const sanmartin = calcularMetricas(99)[activeTab];

            return (
                <div>
                    {/* HEADER */}
                    <div className="header">
                        <div className="header-brand">
                            <div className="header-logo">B</div>
                            <div>
                                <div className="header-title">Dashboard Operativo</div>
                                <div className="header-sub">Monitoreo de ventas y operaciones</div>
                            </div>
                        </div>
                        <div className="header-controls">
                            <div className="control-group">
                                <label className="control-label">Período</label>
                                <select
                                    className="control-select"
                                    value={mesSeleccionado}
                                    onChange={e => setMesSeleccionado(Number(e.target.value))}
                                >
                                    {mesesNombres.map((m, i) => <option key={m} value={i + 1}>{m}</option>)}
                                </select>
                            </div>
                            <div className="control-group">
                                <label className="control-label">Días Hábiles</label>
                                <input
                                    type="number"
                                    className="control-input"
                                    value={diasHabiles}
                                    onChange={e => setDiasHabiles(Number(e.target.value))}
                                    style={{width: '80px'}}
                                />
                            </div>
                            <button
                                className="theme-toggle"
                                onClick={() => setIsDark(!isDark)}
                            >
                                {isDark ? '☀️ Día' : '🌙 Noche'}
                            </button>
                        </div>
                    </div>

                    {/* NAV TABS */}
                    <div className="nav">
                        <button
                            className={`nav-tab ${activeTab === 'general' ? 'active' : ''}`}
                            onClick={() => setActiveTab('general')}
                        >
                            Gestión General
                        </button>
                        <button
                            className={`nav-tab ${activeTab === 'neumaticos' ? 'active' : ''}`}
                            onClick={() => setActiveTab('neumaticos')}
                        >
                            Neumáticos
                        </button>
                    </div>

                    {/* MAIN */}
                    <div className="main">
                        <div className="panel active">
                            <div className="card-grid">
                                <SucursalCard titulo="BECCAR" codigo="88" datos={beccar} color="accent" />
                                <SucursalCard titulo="SAN MARTÍN" codigo="99" datos={sanmartin} color="teal" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function SucursalCard({ titulo, codigo, datos, color }) {
            const colorClass = color === 'accent' ? 'badge-accent' : 'badge-teal';
            const valueColor = color;

            return (
                <div className="card">
                    <div className="card-header">
                        <div>
                            <div className="card-title">{titulo}</div>
                            <div className="card-subtitle">Sucursal {codigo}</div>
                        </div>
                        <div className={`badge ${colorClass}`}>
                            <span className={`indicator ${color}`}></span> Activo
                        </div>
                    </div>
                    <div className="card-body">
                        {Object.entries(datos).map(([label, value]) => (
                            <div key={label} className="metric-row">
                                <div className="metric-label">{label}</div>
                                <div className={`metric-value ${valueColor}`}>
                                    {label.includes('%')
                                        ? `${(value * 100).toFixed(1)}%`
                                        : (label.includes('Fact') || label.includes('Diaria'))
                                            ? `$${Math.round(value).toLocaleString('es-AR')}`
                                            : Math.round(value).toLocaleString('es-AR')}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardVentas />);
    </script>
</body>
</html>
