<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operativo 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-display {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
        }
        
        .gradient-border {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9) border-box;
            border: 1px solid transparent;
        }
        
        .metric-card {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(71, 85, 105, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .metric-card:hover {
            background: rgba(15, 23, 42, 0.6);
            border-color: rgba(71, 85, 105, 0.4);
            transform: translateY(-2px);
        }
        
        .sucursal-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.5) 0%, rgba(30, 41, 59, 0.3) 100%);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(71, 85, 105, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.3);
        }
        
        .btn-primary.active {
            background: linear-gradient(135deg, #3b82f6 0%, #0ea5e9 100%);
            box-shadow: 0 12px 24px rgba(59, 130, 246, 0.4);
        }
        
        .btn-secondary {
            background: rgba(71, 85, 105, 0.1);
            border: 1px solid rgba(71, 85, 105, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.2);
            border-color: rgba(71, 85, 105, 0.5);
        }
        
        .stat-value {
            background: linear-gradient(135deg, #3b82f6, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(71, 85, 105, 0) 0%, rgba(71, 85, 105, 0.3) 50%, rgba(71, 85, 105, 0) 100%);
        }
        
        .header-accent {
            position: absolute;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .fade-in {
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 { animation-delay: 0.1s; }
        .stagger-2 { animation-delay: 0.2s; }
        
        .metric-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSCmHe-75PjLOZxC8rj9ZiRx58SU0crBtp9FGokKFYUIN3FSONy7091EQPrVZWmHrkuXEuK-rg3uCx4/pub?output=csv";

        function DashboardVentas() {
            const [rawData, setRawData] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [mesSeleccionado, setMesSeleccionado] = React.useState(3); 
            const [diasHabiles, setDiasHabiles] = React.useState(22);
            const [activeTab, setActiveTab] = React.useState('general');

            const mesesNombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

            React.useEffect(() => {
                fetch(CSV_URL)
                    .then(res => res.text())
                    .then(csv => {
                        const rows = csv.split('\n').filter(r => r.trim() !== '').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
                        const headers = rows[0].map(h => h.trim().replace(/"/g, ''));
                        const jsonData = rows.slice(1).map(row => {
                            let obj = {};
                            row.forEach((cell, i) => { obj[headers[i]] = cell?.trim().replace(/"/g, ''); });
                            return obj;
                        });
                        setRawData(jsonData);
                        setLoading(false);
                    });
            }, []);

            const calcularMetricas = (idVendedor) => {
                const filtrado = rawData.filter(r => {
                    const matchVendedor = Number(r.Vendedor) === idVendedor;
                    const valorMesCol = String(r.Mes || '').trim();
                    const nombreMesActual = mesesNombres[mesSeleccionado - 1].toUpperCase();
                    return matchVendedor && (valorMesCol === String(mesSeleccionado) || valorMesCol.toUpperCase() === nombreMesActual);
                });

                const parseNum = (val) => {
                    if (!val || val === "") return 0;
                    let clean = val.replace(/[$\s]/g, '').replace(/\./g, '').replace(',', '.');
                    return parseFloat(clean) || 0;
                };

                const sum = (arr, col) => arr.reduce((acc, r) => acc + parseNum(r[col]), 0);
                const incluye = (arr, col, txt) => arr.filter(r => String(r[col] || '').toUpperCase().includes(txt.toUpperCase()));

                const factTotal = sum(filtrado, 'Importe ML');
                const accRows = incluye(filtrado, 'RANGO', 'ACCESORIO');
                const accFact = sum(accRows, 'Importe ML');
                
                const nMostrador = sum(filtrado.filter(r => r['Llanta 17'] && ['SUB','VAN','H','SPIDER','T','V','W'].includes(String(r.RANGO || '').toUpperCase())), 'Cant');
                const nOtras = sum(filtrado.filter(r => r['Llanta 17'] && String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Cant');
                const totalCantNeu = nMostrador + nOtras;

                return {
                    general: {
                        "Facturación Total": factTotal,
                        "Facturación Diaria": diasHabiles > 0 ? factTotal / diasHabiles : 0,
                        "Alineaciones": sum(incluye(filtrado, 'Descripción', 'ALINEACION'), 'Cant'),
                        "Balanceos": sum(incluye(filtrado, 'Descripción', 'BALANCEO'), 'Cant'),
                        "Válvulas (Cant)": sum(incluye(filtrado, 'Descripción', 'VALVULA'), 'Cant'),
                        "% Valvulas/Neu": totalCantNeu > 0 ? sum(incluye(filtrado, 'Descripción', 'VALVULA'), 'Cant') / totalCantNeu : 0,
                    },
                    neumaticos: {
                        "Facturación Neumáticos": sum(filtrado.filter(r => String(r.Marca || '').toUpperCase() === 'PIRELLI' || String(r.RANGO || '').toUpperCase() === 'OTRAS MARCAS'), 'Importe ML'),
                        "Total Neumáticos (Cant)": totalCantNeu,
                        "Accesorios (Cant)": sum(accRows, 'Cant'),
                        "% Accesorios/Fact": factTotal > 0 ? accFact / factTotal : 0,
                        "Baterías": sum(incluye(filtrado, 'Descripción', 'BAT'), 'Cant'),
                        "Matafuegos": sum(incluye(filtrado, 'Descripción', 'MATAFUEGO'), 'Cant'),
                    }
                };
            };

            if (loading) {
                return (
                    <div className="h-screen flex justify-center items-center">
                        <div className="text-center">
                            <div className="inline-block">
                                <div className="w-12 h-12 border-2 border-blue-500/30 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-400 text-sm font-medium">Cargando datos...</p>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen relative">
                    <div className="absolute inset-0 bg-gradient-to-br from-blue-950/5 via-transparent to-slate-950/5 pointer-events-none"></div>
                    
                    <div className="relative max-w-7xl mx-auto px-6 py-8">
                        
                        {/* Header */}
                        <header className="mb-12 fade-in">
                            <div className="relative">
                                <div className="header-accent left-0 top-0"></div>
                                <div className="header-accent right-0 top-1/2"></div>
                                
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-8">
                                    <div>
                                        <h1 className="font-display text-4xl sm:text-5xl text-slate-100 mb-2">Dashboard Operativo</h1>
                                        <p className="text-slate-400 text-sm font-medium tracking-wide">Monitoreo de ventas y operaciones | 2026</p>
                                    </div>
                                    
                                    <div className="flex flex-wrap items-center gap-6">
                                        <div className="flex flex-col gap-3">
                                            <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Período</label>
                                            <select 
                                                className="px-4 py-2 rounded-lg bg-slate-800/50 border border-slate-700 text-slate-200 font-medium focus:outline-none focus:border-blue-500 transition-colors cursor-pointer"
                                                value={mesSeleccionado} 
                                                onChange={e => setMesSeleccionado(Number(e.target.value))}
                                            >
                                                {mesesNombres.map((m, i) => <option key={m} value={i+1}>{m}</option>)}
                                            </select>
                                        </div>
                                        
                                        <div className="flex flex-col gap-3">
                                            <label className="text-xs font-semibold text-slate-400 uppercase tracking-wider">Días Hábiles</label>
                                            <input 
                                                type="number" 
                                                className="px-4 py-2 rounded-lg bg-slate-800/50 border border-slate-700 text-slate-200 font-medium focus:outline-none focus:border-blue-500 transition-colors w-28"
                                                value={diasHabiles} 
                                                onChange={e => setDiasHabiles(Number(e.target.value))}
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Tab Navigation */}
                        <div className="mb-10 fade-in stagger-1">
                            <div className="inline-flex gap-3 p-1.5 bg-slate-900/50 border border-slate-800 rounded-lg backdrop-filter backdrop-blur">
                                {['general', 'neumaticos'].map(tab => (
                                    <button 
                                        key={tab} 
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-6 py-2.5 rounded-md font-medium text-sm transition-all ${
                                            activeTab === tab 
                                                ? 'btn-primary text-white' 
                                                : 'btn-secondary text-slate-400 hover:text-slate-200'
                                        }`}
                                    >
                                        {tab === 'general' ? 'Gestión General' : 'Neumáticos'}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Sucursal Cards Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 fade-in stagger-2">
                            <SucursalCard 
                                titulo="BECCAR" 
                                codigo="88"
                                datos={calcularMetricas(88)[activeTab]} 
                                color="blue"
                            />
                            <SucursalCard 
                                titulo="SAN MARTÍN" 
                                codigo="99"
                                datos={calcularMetricas(99)[activeTab]} 
                                color="emerald"
                            />
                        </div>
                    </div>
                </div>
            );
        }

        const SucursalCard = ({ titulo, codigo, datos, color }) => (
            <div className="sucursal-card rounded-2xl p-8 border">
                <div className="flex items-center justify-between mb-8">
                    <div>
                        <h2 className="font-display text-2xl text-slate-100 mb-1">{titulo}</h2>
                        <p className="text-xs font-medium text-slate-500 uppercase tracking-wider">Sucursal {codigo}</p>
                    </div>
                    <div className={`w-3 h-3 rounded-full ${color === 'blue' ? 'bg-blue-500' : 'bg-emerald-500'}`}></div>
                </div>

                <div className="divider mb-8"></div>

                <div className="space-y-6">
                    {Object.entries(datos).map(([label, val], idx) => (
                        <div key={label} className="metric-card rounded-xl p-5 fade-in" style={{animationDelay: `${idx * 0.05}s`}}>
                            <div className="flex justify-between items-start">
                                <div>
                                    <p className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">{label}</p>
                                    <p className="stat-value font-display text-3xl font-bold">
                                        {label.includes('%') 
                                            ? `${(val * 100).toFixed(1)}%` 
                                            : (label.includes('Fact') || label.includes('Ticket') || label.includes('Diaria')) 
                                                ? `$${Math.round(val).toLocaleString('es-AR')}` 
                                                : Math.round(val).toLocaleString('es-AR')}
                                    </p>
                                </div>
                                <div className={`w-2 h-8 rounded-full ${color === 'blue' ? 'bg-gradient-to-b from-blue-500 to-blue-500/20' : 'bg-gradient-to-b from-emerald-500 to-emerald-500/20'}`}></div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DashboardVentas />);
    </script>
</body>
</html>
